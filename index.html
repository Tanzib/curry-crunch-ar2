<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Curry Crunch AR</title>
<script type="module" src="https://unpkg.com/@google/model-viewer@3.5.0/dist/model-viewer.min.js"></script>
<style>
  :root { --brand:#e4002b; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; overflow:hidden; background:#111;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }

  model-viewer {
    position:fixed; inset:0; width:100%; height:100%;
    --poster-color:#111; background:radial-gradient(120% 120% at 50% 30%, #2a0006, #111);
  }

  .top { position:fixed; top:0; left:0; right:0; z-index:5; display:flex; justify-content:center;
    padding:calc(env(safe-area-inset-top) + 12px) 12px 12px; pointer-events:none; }
  .badge { background:var(--brand); color:#fff; font-weight:800; letter-spacing:.5px;
    padding:8px 16px; border-radius:999px; font-size:14px; box-shadow:0 6px 16px rgba(0,0,0,.35); }

  .hint { position:fixed; left:50%; top:calc(env(safe-area-inset-top) + 58px); transform:translateX(-50%);
    z-index:5; background:rgba(0,0,0,.55); color:#fff; padding:8px 14px; border-radius:12px;
    font-size:13px; text-align:center; max-width:88vw; }

  #arBtn { position:fixed; left:50%; bottom:calc(env(safe-area-inset-bottom) + 22px); transform:translateX(-50%);
    z-index:6; background:var(--brand); color:#fff; border:none; font-weight:800; font-size:17px;
    padding:15px 26px; border-radius:16px; box-shadow:0 10px 24px rgba(228,0,43,.45);
    display:flex; align-items:center; gap:8px; }
  #arBtn:active { transform:translateX(-50%) scale(.96); }

  .loader { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    color:#fff; z-index:4; gap:14px; }
  .spin { width:46px; height:46px; border:4px solid rgba(255,255,255,.25); border-top-color:#fff;
    border-radius:50%; animation:rot 1s linear infinite; }
  @keyframes rot { to { transform:rotate(360deg) } }
</style>
</head>
<body>

  <model-viewer
      id="mv"
      src="https://d3u0tzju9qaucj.cloudfront.net/7d051b5a-7bfe-49fe-a484-24e7b3a9458a/680693cc-0aba-488e-bf60-ab8f8f720782.glb"
      alt="KFC Curry Crunch bucket"
      camera-controls
      touch-action="none"
      auto-rotate
      auto-rotate-delay="0"
      rotation-per-second="24deg"
      interaction-prompt="none"
      shadow-intensity="1"
      exposure="1.05"
      environment-image="neutral"
      camera-orbit="0deg 78deg 105%"
      min-camera-orbit="auto 0deg auto"
      max-camera-orbit="auto 180deg auto"
      ar
      ar-modes="webxr scene-viewer quick-look"
      ar-scale="auto">
    <div class="loader" slot="poster">
      <div class="spin"></div>
      <div>Loading the Curry Crunch…</div>
    </div>
    <button id="arBtn" slot="ar-button">📷 View in your room (AR)</button>
  </model-viewer>

  <div class="top"><div class="badge">CURRY CRUNCH • AR</div></div>
  <div class="hint" id="hint">Drag with one finger to spin all the way around • pinch to zoom</div>

  <script>
    const mv = document.getElementById('mv');
    const hint = document.getElementById('hint');
    // hide the hint on first touch; keep auto-rotate ON (it resumes after interaction)
    mv.addEventListener('pointerdown', ()=>{ hint.style.transition='opacity .5s'; hint.style.opacity='0'; }, {once:true});
    mv.addEventListener('load', ()=>{ if(!mv.canActivateAR){ const b=document.getElementById('arBtn'); if(b) b.style.display='none'; } });
  </script>
</body>
</html>
